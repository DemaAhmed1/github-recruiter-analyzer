<!DOCTYPE html>
<html>
<head>
<title>GitHub Analysis</title>
<style>
body {
font-family: Arial;
background: #0d1117;
color: white;
text-align: center;
padding: 30px;
}

.card {
background: #161b22;
padding: 20px;
border-radius: 15px;
width: 300px;
margin: auto;
box-shadow: 0 0 10px rgba(255,255,255,0.1);
}

img {
border-radius: 50%;
width: 120px;
}

.score {
font-size: 20px;
color: #00ff88;
margin-top: 10px;
}

a {
color: #58a6ff;
text-decoration: none;
display: block;
margin-top: 15px;
}
</style>
</head>
<body>

<h1>GitHub Analysis</h1>
<style>
body.gold {
background: linear-gradient(45deg, #FFD700, #FFF8DC);
}

body.silver {
background: linear-gradient(45deg, #C0C0C0, #F5F5F5);
}

body.bronze {
background: linear-gradient(45deg, #CD7F32, #FFE4C4);
}

h2 {
font-size: 24px;
text-align: center;
margin-top: 20px;
}
</style>
<div class="card">

<img src="{{ avatar }}">

<h2>{{ name }}</h2>

<p>Followers: {{ followers }}</p>

<p>Public Repositories: {{ repos }}</p>

<div class="score">
Score: {{ score }}
</div>

<a href="/">Back</a>
<p> Level:{{Level}}</p>
 <P>  Score:{{score}}</p>
    <body class=""{{level}}"">
<h2>{{message }}</h2>
</div>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
confetti({
particleCount: 150,
spread: 90,
origin: { y: 0.6 }
});
</script>
</body>
</html>
