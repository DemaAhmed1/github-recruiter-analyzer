<!DOCTYPE html>
<html>
<head>
<title>Result</title>

<style>
body {
font-family: Arial, sans-serif;
text-align: center;
background: linear-gradient(to right, #f5f5f5, #dfe9f3);
margin-top: 80px;
}

.card {
background: white;
display: inline-block;
padding: 20px;
border-radius: 10px;
box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

img {
border-radius: 50%;
margin-top: 10px;
}

footer {
margin-top: 60px;
font-size: 14px;
color: gray;
}
</style>
</head>

<body>

<div class="card">
<h2>{{ name }}</h2>

<img src="{{ avatar }}" width="120">

<p>Followers: {{ followers }}</p>
<p>Public Repos: {{ repos }}</p>
<p>Score: {{ score }}</p>
</div>

<footer>
<p>© 2026 Dema Ahmed - All rights reserved</p>
</footer>

</body>
</html>
