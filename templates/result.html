<!DOCTYPE html>
<html>
<head>
<title>Result</title>

<style>
body {
font-family: Arial;
text-align: center;
background: #0f172a;
color: white;

margin: 0;
padding: 40px 15px;

display: flex;
flex-direction: column;
justify-content: center;
min-height: 100vh;
}

.card {
background: #1e293b;
display: inline-block;
padding: 25px;
border-radius: 15px;
box-shadow: 0 0 25px rgba(56,189,248,0.3);
animation: pop 0.5s ease;

width: 90%;
max-width: 350px;
margin: auto;
}

@keyframes pop {
from { transform: scale(0.8); opacity: 0; }
to { transform: scale(1); opacity: 1; }
}

img {
border-radius: 50%;
margin-top: 10px;
width: 100px;
}

h2 {
color: #38bdf8;
}

p {
color: #cbd5e1;
margin: 5px 0;
}

.score {
font-size: 20px;
font-weight: bold;
margin-top: 10px;
}

.high { color: #22c55e; }
.medium { color: #facc15; }
.low { color: #ef4444; }
</style>
</head>

<body>

<div class="card">
<h2>{{ name }}</h2>

<img src="{{ avatar }}" width="100">

<p>Followers: {{ followers }}</p>
<p>Public Repos: {{ repos }}</p>

<div class="score
{% if score >= 50 %}high
{% elif score >= 20 %}medium
{% else %}low
{% endif %}
">
Score: {{ score }} <br>
Level: {{ level }}
</div>
</div>

<!-- 🎉 احتفال -->
{% if celebrate %}
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
confetti({
particleCount: 200,
spread: 90,
origin: { y: 0.6 }
});
</script>

<h3 style="color:#22c55e; margin-top:20px;">
🎉 Great GitHub Profile!
</h3>
{% endif %}

</body>
</html>
