<!DOCTYPE html>
<html>
<head>
<title>Result</title>

<style>
body {
font-family: Arial;
text-align: center;
background: #0f172a;
color: white;
margin-top: 80px;
}

.card {
background: #1e293b;
display: inline-block;
padding: 25px;
border-radius: 12px;
box-shadow: 0 0 20px rgba(56,189,248,0.2);
}

img {
border-radius: 50%;
margin-top: 10px;
}

p {
color: #cbd5e1;
}

h2 {
color: #38bdf8;
}
</style>
</head>

<body>

<div class="card">
<h2>{{ name }}</h2>
<img src="{{ avatar }}" width="120">

<p>Followers: {{ followers }}</p>
<p>Public Repos: {{ repos }}</p>
<p>Score: {{ score }}</p>
</div>

</body>
</html>
