<!DOCTYPE html>
<html>
<head>
<title>GitHub Recruiter Analyzer</title>

<style>
body {
font-family: Arial, sans-serif;
text-align: center;
background: #0f172a; /* غامق */
color: white;
margin-top: 100px;
}

h1 {
color: #38bdf8;
}

input {
padding: 12px;
width: 260px;
border: none;
border-radius: 6px;
outline: none;
}

button {
padding: 12px 25px;
background: #38bdf8;
color: black;
border: none;
border-radius: 6px;
margin-top: 10px;
cursor: pointer;
font-weight: bold;
transition: 0.3s;
}

button:hover {
background: #0ea5e9;
transform: scale(1.05);
}

footer {
margin-top: 80px;
font-size: 14px;
color: #94a3b8;
}

a {
color: #38bdf8;
text-decoration: none;
}

a:hover {
text-decoration: underline;
}
</style>
</head>

<body>

<h1>GitHub Recruiter Analyzer</h1>
<p>Enter GitHub username to analyze</p>

<form method="POST" action="/analyze">
<input type="text" name="username" placeholder="GitHub Username" required>
<br><br>
<button type="submit">Analyze 🚀</button>
</form>
